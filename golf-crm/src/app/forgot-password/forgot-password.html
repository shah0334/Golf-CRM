<div class="min-h-screen bg-cover bg-center bg-no-repeat text-[#FAF7F2] py-8 px-4 flex items-center justify-center font-sans"
  style="background-image: linear-gradient(rgba(5, 27, 17, 0.8), rgba(5, 27, 17, 0.85)), url('/golf_course_bg.png');">
  
  <div class="w-full max-w-md bg-[#133824]/40 border border-[#FAF7F2]/10 backdrop-blur-md rounded-[32px] p-8 shadow-2xl relative overflow-hidden text-[#FAF7F2]">
    <!-- Watermark Behind -->
    <div class="absolute -right-4 -bottom-10 opacity-5 pointer-events-none text-white select-none">
      <svg class="w-64 h-64" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2a5 5 0 100 10 5 5 0 000-10zM5 20a7 7 0 0114 0H5z" />
      </svg>
    </div>

    <!-- Header -->
    <div class="text-center space-y-3 mb-6 relative z-10">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-[#051B11] border border-[#DCAE5A]/45 text-[#DCAE5A] flex items-center justify-center shadow-lg">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
        </svg>
      </div>
      <h1 class="text-2xl font-serif font-black text-white tracking-tight">Forgot Password?</h1>
      <p class="text-xs text-[#7A9A8A] font-semibold">Enter your email and we'll send you a password reset link.</p>
    </div>

    <form (ngSubmit)="sendResetLink()" class="space-y-4 relative z-10">
      <div>
        <label class="block text-[10px] font-bold text-[#7A9A8A] uppercase tracking-widest mb-1.5">Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="you@golfclub.com"
          class="block w-full rounded-xl border border-[#FAF7F2]/10 bg-[#051B11]/50 py-2.5 px-4 text-xs font-semibold focus:border-[#DCAE5A] focus:outline-none focus:ring-1 focus:ring-[#DCAE5A] transition-all text-white placeholder-white/20">
      </div>

      <button type="submit" [disabled]="isLoading"
        class="w-full flex items-center justify-center gap-2 py-3 bg-[#DCAE5A] hover:bg-[#cdaf6d] text-[#051B11] text-xs font-extrabold rounded-xl transition-all cursor-pointer shadow-md select-none uppercase tracking-wider mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
        @if (isLoading) {
          <svg class="animate-spin h-4 w-4 text-[#051B11]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Sending...</span>
        } @else {
          <span>Send Reset Link</span>
        }
      </button>

      <div class="text-center pt-2">
        <a routerLink="/" class="text-xs font-semibold text-[#DCAE5A] hover:text-[#cdaf6d] transition-colors cursor-pointer">
          Back to Login
        </a>
      </div>
    </form>
  </div>
</div>
